<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>あたまのなかぷろじぇくと</title>
    <meta name="description" content="ここは「わたし」のあたまのなかのせかい、すきなものも、きらいなものも、ちょっぴりとしたこころのきずも。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="あたまのなかぷろじぇくと" />
    <meta property="og:description" content="ここは「わたし」のあたまのなかのせかい、すきなものも、きらいなものも、ちょっぴりとしたこころのきずも。" />
    <meta property="og:image" content="Assets/Image/Kumasan-Ozyou-scene-two-shot.PNG" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="あたまのなかぷろじぇくと" />
    <meta name="twitter:description" content="ここは「わたし」のあたまのなかのせかい、すきなものも、きらいなものも、ちょっぴりとしたこころのきずも。" />
    <meta name="twitter:image" content="Assets/Image/Kumasan-Ozyou-scene-two-shot.PNG" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="intro-overlay" data-intro-overlay>
      <button class="intro-overlay__button" type="button" data-intro-button aria-label="タップしてサイトに入る">
        <span class="intro-overlay__card">
          <img
            class="intro-overlay__image"
            src="Assets/Image/real-photo-Room-Marchen-with-Ozuou-and-Kumasan.jpg"
            alt="お嬢とくまさんの写真"
          />
        </span>
        <span class="intro-overlay__tap">TAP</span>
      </button>
      <div class="intro-overlay__wash"></div>
    </div>

    <audio loop preload="auto" data-bg-audio>
      <source src="Assets/Music/%E3%82%84%E3%82%84%E3%81%A1%E3%82%83%E3%82%80%E3%81%AE(%E6%B1%9A)%E9%83%A8%E5%B1%8B.mp3" type="audio/mpeg" />
    </audio>

    <main class="page-shell">
      <header class="site-header">
        <h1 class="site-title">あたまのなか<br />ぷろじぇくと</h1>
        <button
          class="about-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="project-about"
          data-about-toggle
        >
          あたまのなかぷろじぇくととは
        </button>
        <div class="about-panel" id="project-about" hidden>
          <p>
            あたまのなかぷろじぇくとの説明文は、あとからここへまとめて入れられます。
          </p>
        </div>
      </header>

      <section class="hero-room" aria-label="お部屋の会話エリア">
        <div class="room-stage">
          <img
            class="room-background"
            src="Assets/Image/Room-Marchen.JPG"
            alt="お部屋の背景"
          />

          <button
            class="character character-bear"
            type="button"
            data-character="bear"
            aria-controls="bear-bubble"
            aria-expanded="false"
          >
            <span class="speech-bubble bear-bubble" id="bear-bubble" role="status" aria-live="polite">
              <span class="speech-name">くまさん</span>
              <span class="speech-text">セリフはあとで設定できます。</span>
            </span>
            <img src="Assets/Image/Kumasan-default.PNG" alt="くまさん" />
          </button>

          <button
            class="character character-girl"
            type="button"
            data-character="girl"
            aria-controls="girl-bubble"
            aria-expanded="false"
          >
            <span class="speech-bubble girl-bubble" id="girl-bubble" role="status" aria-live="polite">
              <span class="speech-name">お嬢</span>
              <span class="speech-text">セリフはあとで設定できます。</span>
            </span>
            <img src="Assets/Image/Ozyou-default.PNG" alt="お嬢" />
          </button>
        </div>
      </section>

      <section class="character-intro" aria-labelledby="character-intro-title" data-character-intro>
        <div class="character-intro__chart-card">
          <h2 class="character-intro__title" id="character-intro-title">人物紹介</h2>
          <div class="character-intro__chart-shell">
            <img
              class="character-intro__chart"
              src="Assets/Image/Character-correlation-chart.PNG"
              alt="お嬢、くまさん、恋人の相関図"
            />
            <div class="character-intro__wash" aria-hidden="true"></div>
          </div>
          <button class="character-intro__tap" type="button" data-character-intro-start>
            <span>TAP</span>
          </button>
        </div>

        <div class="character-intro__detail" data-character-intro-detail hidden>
          <article class="character-card" data-character-card>
            <div class="character-card__visual">
              <img class="character-card__image" data-character-image src="Assets/Image/Ozyou-icon.PNG" alt="" />
            </div>
            <div class="character-card__copy">
              <p class="character-card__name" data-character-name>お嬢</p>
              <p class="character-card__text" data-character-text></p>
              <p class="character-card__quote" data-character-quote></p>
            </div>
          </article>

          <nav class="character-intro__controls" aria-label="キャラクター紹介の操作">
            <button class="carousel-button carousel-button--back" type="button" data-character-back>もどる</button>
            <button class="carousel-button" type="button" data-character-prev aria-label="前の紹介へ">
              <span aria-hidden="true">&lt;</span>
            </button>
            <div class="carousel-dots" data-character-dots aria-label="紹介の現在位置"></div>
            <button class="carousel-button" type="button" data-character-next aria-label="次の紹介へ">
              <span aria-hidden="true">&gt;</span>
            </button>
          </nav>
        </div>
      </section>

      <section class="content-placeholder" aria-label="今後追加するエリアその2">
        <div class="content-placeholder-inner">
          <p>この下に、次のコンテンツを追加していけます。</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
